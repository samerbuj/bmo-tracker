<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our BMO Tracker 🥐🧀</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF8E7; /* Butter yellow */
            --card-bg: #FFFFFF;
            --primary: #FFB347; /* Warm cheese/orange */
            --text: #5D4037; /* Dark brown bread crust */
            --border: #F0E6D2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            margin-top: 0;
            color: #8D6E63;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .category-card {
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #FAFAFA;
        }

        .category-header {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rating-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .rating-input {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .rating-input input[type="number"] {
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 8px;
        }

        .slider-group {
            margin-bottom: 15px;
        }

        .slider-group input[type="range"] {
            width: 100%;
        }

        .coffee-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--bg-color);
            border-radius: 15px;
            display: none;
        }

        .score-box {
            font-size: 1.5em;
            font-weight: 700;
            text-align: center;
            margin: 10px 0;
            color: var(--primary);
        }

        .history {
            margin-top: 40px;
            width: 100%;
        }
        
        .history-item {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Our BMO Tracker 🥐🧀</h1>
    <p class="subtitle">The official Copenhagen café rating system</p>

    <div class="input-group">
        <label>Café Name</label>
        <input type="text" id="cafeName" placeholder="e.g., Lille Bakery">
    </div>

    <div id="categoriesContainer"></div>

    <div class="coffee-toggle">
        <input type="checkbox" id="hadCoffee" onchange="toggleCoffee()">
        <label for="hadCoffee" style="margin:0;">We had coffee here! ☕</label>
    </div>

    <button onclick="calculateAndSave()">Calculate & Save Rating</button>

    <div class="results" id="results">
        <h2 style="text-align: center; margin-top: 0;">Final Verdict 🏆</h2>
        <div id="standardScore" class="score-box"></div>
        <div id="coffeeScore" class="score-box" style="display:none;"></div>
        <div id="weightedScore" class="score-box" style="color: #5D4037;"></div>
    </div>

    <div class="history" id="history">
        <h2>Past BMO Adventures 🗺️</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const categories = [
        { id: 'bread', icon: '🍞', name: 'The Bread' },
        { id: 'cheese', icon: '🧀', name: 'The Cheese' },
        { id: 'place', icon: '🪴', name: 'The Place / Vibe' },
        { id: 'price', icon: '💸', name: 'Price / Value' },
        { id: 'coffee', icon: '☕', name: 'The Coffee', hiddenAtStart: true }
    ];

    // Build the UI dynamically
    const container = document.getElementById('categoriesContainer');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.id = `card-${cat.id}`;
        if (cat.hiddenAtStart) div.style.display = 'none';

        div.innerHTML = `
            <div class="category-header">
                <span>${cat.icon} ${cat.name}</span>
            </div>
            <div class="rating-row">
                <div class="rating-input">
                    <label>Your Score (1-10)</label>
                    <input type="number" id="${cat.id}-p1" min="1" max="10">
                </div>
                <div class="rating-input">
                    <label>Partner's Score (1-10)</label>
                    <input type="number" id="${cat.id}-p2" min="1" max="10">
                </div>
            </div>
            <div class="slider-group">
                <label>Importance Weight: <span id="${cat.id}-weight-val">Normal</span></label>
                <input type="range" id="${cat.id}-weight" min="1" max="5" value="3" 
                       oninput="updateSliderLabel('${cat.id}')">
            </div>
            <textarea id="${cat.id}-comment" rows="2" placeholder="Thoughts on the ${cat.id}?"></textarea>
        `;
        container.appendChild(div);
    });

    function updateSliderLabel(id) {
        const val = document.getElementById(`${id}-weight`).value;
        const labels = ["Don't Care", "Slightly", "Normal", "Important", "Crucial!"];
        document.getElementById(`${id}-weight-val`).innerText = labels[val - 1];
    }

    function toggleCoffee() {
        const isChecked = document.getElementById('hadCoffee').checked;
        document.getElementById('card-coffee').style.display = isChecked ? 'block' : 'none';
    }

    function calculateAndSave() {
        const cafeName = document.getElementById('cafeName').value || "Unknown Café";
        const hadCoffee = document.getElementById('hadCoffee').checked;
        
        let sumUnweightedNoCoffee = 0;
        let sumUnweightedWithCoffee = 0;
        let sumWeighted = 0;
        let sumWeights = 0;
        
        let countNoCoffee = 4; // Bread, cheese, place, price
        let countWithCoffee = hadCoffee ? 5 : 4;

        // Calculate averages
        categories.forEach(cat => {
            if (cat.id === 'coffee' && !hadCoffee) return;

            const p1 = parseFloat(document.getElementById(`${cat.id}-p1`).value) || 0;
            const p2 = parseFloat(document.getElementById(`${cat.id}-p2`).value) || 0;
            const weight = parseFloat(document.getElementById(`${cat.id}-weight`).value) || 3;
            
            const catAvg = (p1 + p2) / 2;

            if (cat.id !== 'coffee') {
                sumUnweightedNoCoffee += catAvg;
            }
            sumUnweightedWithCoffee += catAvg;
            
            sumWeighted += (catAvg * weight);
            sumWeights += weight;
        });

        const finalNoCoffee = (sumUnweightedNoCoffee / countNoCoffee).toFixed(1);
        const finalWithCoffee = (sumUnweightedWithCoffee / countWithCoffee).toFixed(1);
        const finalWeighted = (sumWeighted / sumWeights).toFixed(1);

        // Display results
        const resDiv = document.getElementById('results');
        resDiv.style.display = 'block';
        
        document.getElementById('standardScore').innerText = `Standard Rating (No Coffee): ${finalNoCoffee}/10`;
        
        const coffeeScoreEl = document.getElementById('coffeeScore');
        if (hadCoffee) {
            coffeeScoreEl.style.display = 'block';
            coffeeScoreEl.innerText = `Standard Rating (With Coffee): ${finalWithCoffee}/10`;
        } else {
            coffeeScoreEl.style.display = 'none';
        }

        document.getElementById('weightedScore').innerText = `Weighted Average (Priority adjusted): ${finalWeighted}/10`;

        // Save to Local Storage
        const review = { cafe: cafeName, date: new Date().toLocaleDateString(), score: finalWeighted };
        let history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        history.unshift(review); // Add to beginning
        localStorage.setItem('bmoHistory', JSON.stringify(history));
        
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('bmoHistory')) || [];
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        history.forEach(item => {
            list.innerHTML += `<div class="history-item">
                <strong>${item.cafe}</strong> - ${item.date} <br>
                ✨ Weighted Score: ${item.score}/10
            </div>`;
        });
    }

    // Load history on start
    renderHistory();
</script>

</body>
</html>
